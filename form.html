<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review - Essodong N'GNAMA</title>
    <meta name="description"
        content="Submit your detailed product review including ratings, features, and installation dates.">
    <meta name="author" content="Essodong N'GNAMA">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html">
            <label for="product">Product Name</label>
            <select id="product" name="product" required>
                <option value="" disabled selected>Select a Product ...</option>
            </select>

            <fieldset>
                <legend>Overall Rating</legend>
                <div class="rating-group">
                    <label><input type="radio" name="rating" value="1" required> 1★</label>
                    <label><input type="radio" name="rating" value="2"> 2★</label>
                    <label><input type="radio" name="rating" value="3"> 3★</label>
                    <label><input type="radio" name="rating" value="4"> 4★</label>
                    <label><input type="radio" name="rating" value="5"> 5★</label>
                </div>
            </fieldset>

            <label for="installDate">Date of Installation</label>
            <input type="date" id="installDate" name="installDate" required>

            <fieldset>
                <legend>Useful Features (Check all that apply)</legend>
                <label><input type="checkbox" name="features" value="durability"> Durability</label>
                <label><input type="checkbox" name="features" value="ease-of-use"> Ease of Use</label>
                <label><input type="checkbox" name="features" value="performance"> Performance</label>
                <label><input type="checkbox" name="features" value="design"> Design</label>
            </fieldset>

            <label for="reviewText">Written Review (Optional)</label>
            <textarea id="reviewText" name="reviewText" rows="4"></textarea>

            <label for="username">Your Name (Optional)</label>
            <input type="text" id="username" name="username" placeholder="Enter your name">

            <input type="submit" value="Post Review" class="submit-btn">
        </form>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> Essodong N'GNAMA – Togo</p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>
</body>

</html>
