<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review</title>
    <meta name="description"
        content="Submit your product review with rating, installation date, useful features, and feedback.">
    <meta name="author" content="Essodong N'GNAMA">
    <link rel="stylesheet" href="styles/form.css">
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <form method="get" action="review.html">
        <!-- Product Name -->
        <label for="product">Product Name:</label>
        <select id="product" name="product" required>
            <option value="" disabled selected>Select a Product ...</option>
            <!-- Options populated by JS -->
        </select>

        <!-- Overall Rating -->
        <fieldset>
            <legend>Overall Rating:</legend>
            <label for="rating1"><input type="radio" id="rating1" name="rating" value="1" required> ★</label>
            <label for="rating2"><input type="radio" id="rating2" name="rating" value="2" required> ★★</label>
            <label for="rating3"><input type="radio" id="rating3" name="rating" value="3" required> ★★★</label>
            <label for="rating4"><input type="radio" id="rating4" name="rating" value="4" required> ★★★★</label>
            <label for="rating5"><input type="radio" id="rating5" name="rating" value="5" required> ★★★★★</label>
        </fieldset>

        <!-- Date of Installation -->
        <label for="installDate">Date of Installation:</label>
        <input type="date" id="installDate" name="installDate" required>

        <!-- Useful Features -->
        <fieldset>
            <legend>Which features did you find useful in the product? (Check all that apply)</legend>
            <label for="feature1"><input type="checkbox" id="feature1" name="features" value="durability">
                Durability</label>
            <label for="feature2"><input type="checkbox" id="feature2" name="features" value="ease-of-use"> Ease of
                Use</label>
            <label for="feature3"><input type="checkbox" id="feature3" name="features" value="performance">
                Performance</label>
            <label for="feature4"><input type="checkbox" id="feature4" name="features" value="design"> Design</label>
        </fieldset>

        <!-- Written Review -->
        <label for="reviewText">Written Review (Optional):</label>
        <textarea id="reviewText" name="reviewText" rows="4" cols="50"></textarea>

        <!-- User Name -->
        <label for="username">Your Name (Optional):</label>
        <input type="text" id="username" name="username">

        <!-- Submit -->
        <input type="submit" value="Post Review" class="submit-btn">
    </form>

    <footer>
        <p>&copy; <span id="year"></span> Essodong N'GNAMA – Togo</p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>

    <script src="scripts/form.js" defer></script>
</body>

</html>
